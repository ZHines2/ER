<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ɚ</title>
  <style>
    :root{ --bg:#0a0a0a; --ink:#e6e6e6; --muted:#9aa0a6; --accent:#fff; --panel:#111; --border:#444; }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font:14px/1.35 ui-monospace,Menlo,Consolas,monospace;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
    .wrap{max-width:900px;margin:0 auto;padding:16px}
    .title{color:var(--accent);margin:0 0 10px 0;letter-spacing:.4px}
    .crt{background:var(--panel);border:1px solid var(--border);box-shadow:0 0 0 1px #000 inset}
    #gameCanvas{display:block;width:100%;max-width:860px;aspect-ratio:40/21;border:1px dashed var(--border);background:#000;margin:0 auto;touch-action:manipulation}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .section{padding:10px;border:1px solid var(--border)}
    .section h2{margin:0 0 8px 0;font-size:13px;color:var(--muted)}
    .mono{white-space:pre-wrap}
    .kv{display:flex;gap:16px;flex-wrap:wrap}
    button{background:transparent;color:var(--ink);border:1px solid var(--border);padding:8px 12px;border-radius:4px;cursor:pointer;user-select:none}
    button:hover{border-color:var(--accent)}
    button.disabled{opacity:.5;cursor:not-allowed}
    #tests{font-size:12px;color:#9aa0a6;white-space:pre-wrap;margin-top:8px}
    @media (max-width:720px){ .grid{grid-template-columns:1fr} button{width:100%;padding:12px 14px;font-size:16px} .title{font-size:16px} .section h2{font-size:12px} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title"> ɚ <span style="color:#9aa0a6">[TTY]</span></h1>
    <canvas id="gameCanvas" class="crt" width="800" height="420"></canvas>

    <div class="grid">
      <div class="section crt">
        <h2>// resources</h2>
        <div class="kv mono">
          <span>pixels: <span id="pixelsDisplay">0</span></span>
          <span>energy: <span id="energyDisplay">0</span></span>
          <span>science: <span id="scienceDisplay">0</span></span>
        </div>
        <pre id="tests"></pre>
      </div>
      <div class="section crt">
        <h2>// upgrades</h2>
        <div id="upgrades" class="mono"></div>
      </div>
      <div class="section crt">
        <h2>// buildings</h2>
        <div id="buildings" class="mono"></div>
      </div>
      <div class="section crt">
        <h2>// research</h2>
        <div id="research" class="mono"></div>
      </div>
    </div>
  </div>

  <script>
  // ---------- core state ----------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let cssW = 800, cssH = 420, dprScale = 1;
  const state = { resources:{pixels:0,energy:0,science:0}, balls:[], mul:{pixel:1,energy:1} };

  function randSign(){ return Math.random()>.5?1:-1 }

  // HiDPI + responsive fit (physics in CSS px)
  function fitCanvas(){
    const w = Math.min(860, Math.floor((canvas.parentElement && canvas.parentElement.clientWidth) || 800));
    const h = Math.floor(w * 21/40);
    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    cssW = w; cssH = h; dprScale = dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const need = canvas.width !== Math.floor(w*dpr) || canvas.height !== Math.floor(h*dpr);
    if (need) {
      canvas.width = Math.floor(w*dpr);
      canvas.height = Math.floor(h*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      // clamp balls inside new CSS bounds
      for (const b of state.balls) {
        b.r = 8;
        b.x = Math.max(b.r, Math.min(cssW - b.r, (typeof b.x==='number'? b.x : cssW/2)));
        b.y = Math.max(b.r, Math.min(cssH - b.r, (typeof b.y==='number'? b.y : cssH/2)));
      }
    }
  }
  window.addEventListener('resize', fitCanvas, {passive:true});

  // ---------- data defs ----------
  const Upgrades = {
    speed:  { name:'speed++',   cost:{pixels:12}, run(){ state.balls.forEach(b=>{b.vx*=1.15; b.vy*=1.15;}); this.cost.pixels=Math.ceil(this.cost.pixels*1.35);} },
    extra:  { name:'spawn ball',cost:{pixels:40}, run(){ state.balls.push(createBall()); this.cost.pixels=Math.ceil(this.cost.pixels*1.6);} },
    pMult:  { name:'pixel x2',  cost:{energy:60}, run(){ state.mul.pixel*=2; this.cost.energy=Math.ceil(this.cost.energy*3);} },
    eMult:  { name:'energy x2', cost:{pixels:70}, run(){ state.mul.energy*=2; this.cost.pixels=Math.ceil(this.cost.pixels*3);} },
  };

  const Buildings = {
    pgen: { name:'pixel-gen', cost:{energy:25}, prod:{pixels:.15}, n:0 },
    ecap: { name:'collector', cost:{pixels:35}, prod:{energy:.10}, n:0 },
    lab : { name:'lab',       cost:{pixels:80, energy:40}, prod:{science:.05}, n:0 },
  };

  const Research = {
    physics: { name:'physics', cost:{science:120}, run(){ state.balls.forEach(b=>{b.vx*=1.07; b.vy*=1.07;}); delete Research.physics; buildResearch(); } },
    cache:   { name:'cache',   cost:{science:250}, run(){ savePeriod=2500; delete Research.cache; buildResearch(); } },
  };

  // ---------- helpers ----------
  function createBall(){
    const s = Math.random()*1.4 + 1.2;
    return { x: cssW/2, y: cssH/2, vx: randSign()*s, vy: randSign()*s, r: 8 };
  }
  function can(cost){ return Object.entries(cost).every(([k,v]) => (state.resources[k]||0) >= v ); }
  function pay(cost){ for(const [k,v] of Object.entries(cost)) state.resources[k]-=v; }
  function costStr(cost){ return Object.entries(cost).map(([k,v])=>`${v} ${k}`).join(', '); }

  // ---------- UI build & updates ----------
  function line(label,id){ const b=document.createElement('button'); b.id=id; b.textContent=label; return b; }

  function buildUpgrades(){ const root=document.getElementById('upgrades'); root.innerHTML='';
    for(const [k,u] of Object.entries(Upgrades)){
      const b=line(`${u.name}  [${costStr(u.cost)}]`,`u_${k}`);
      b.onclick=()=>{ if(can(u.cost)){ pay(u.cost); u.run(); refresh(true); } };
      root.appendChild(b);
    }
  }
  function buildBuildings(){ const root=document.getElementById('buildings'); root.innerHTML='';
    for(const [k,bld] of Object.entries(Buildings)){
      const b=line(`${bld.name} x${bld.n}  [${costStr(bld.cost)}]`,`b_${k}`);
      b.onclick=()=>{ if(can(bld.cost)){ pay(bld.cost); bld.n++; refresh(true); } };
      root.appendChild(b);
    }
  }
  function buildResearch(){ const root=document.getElementById('research'); root.innerHTML='';
    for(const [k,r] of Object.entries(Research)){
      const b=line(`${r.name}  [${costStr(r.cost)}]`,`r_${k}`);
      b.onclick=()=>{ if(can(r.cost)){ pay(r.cost); r.run(); refresh(true); } };
      root.appendChild(b);
    }
  }

  function updateAfford(){
    for(const [k,u] of Object.entries(Upgrades)){
      const el=document.getElementById(`u_${k}`); if(!el) continue;
      el.classList.toggle('disabled', !can(u.cost)); el.textContent = `${u.name}  [${costStr(u.cost)}]`;
    }
    for(const [k,bld] of Object.entries(Buildings)){
      const el=document.getElementById(`b_${k}`); if(!el) continue;
      el.classList.toggle('disabled', !can(bld.cost)); el.textContent = `${bld.name} x${bld.n}  [${costStr(bld.cost)}]`;
    }
    for(const [k,r] of Object.entries(Research)){
      const el=document.getElementById(`r_${k}`); if(!el) continue;
      el.classList.toggle('disabled', !can(r.cost)); el.textContent = `${r.name}  [${costStr(r.cost)}]`;
    }
  }

  function refresh(rebuild=false){
    document.getElementById('pixelsDisplay').textContent = state.resources.pixels.toFixed(1);
    document.getElementById('energyDisplay').textContent = state.resources.energy.toFixed(1);
    document.getElementById('scienceDisplay').textContent = state.resources.science.toFixed(1);
    if(rebuild){ buildUpgrades(); buildBuildings(); buildResearch(); }
    updateAfford();
  }

  // ---------- simulation ----------
  function stepBalls(){
    for(const b of state.balls){
      if(!Number.isFinite(b.vx)||Math.abs(b.vx)<.05) b.vx=randSign()*1.2;
      if(!Number.isFinite(b.vy)||Math.abs(b.vy)<.05) b.vy=randSign()*1.2;
      b.x+=b.vx; b.y+=b.vy;
      let hitV=false, hitH=false;
      if(b.x-b.r<=0){ b.x=b.r; b.vx*=-1; hitV=true; }
      else if(b.x+b.r>=cssW){ b.x=cssW-b.r; b.vx*=-1; hitV=true; }
      if(b.y-b.r<=0){ b.y=b.r; b.vy*=-1; hitH=true; }
      else if(b.y+b.r>=cssH){ b.y=cssH-b.r; b.vy*=-1; hitH=true; }
      if(hitV&&hitH){ state.resources.pixels += 2*state.mul.pixel; state.resources.energy += 1*state.mul.energy; }
      else if(hitV||hitH){ state.resources.pixels += 1*state.mul.pixel; state.resources.energy += .5*state.mul.energy; }
    }
    
    // Ball-to-ball collision detection
    for(let i = 0; i < state.balls.length; i++){
      for(let j = i + 1; j < state.balls.length; j++){
        const b1 = state.balls[i];
        const b2 = state.balls[j];
        const dx = b2.x - b1.x;
        const dy = b2.y - b1.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const minDistance = b1.r + b2.r;
        
        if(distance < minDistance && distance > 0){
          // Collision detected - calculate elastic collision response
          const nx = dx / distance; // normalized collision normal
          const ny = dy / distance;
          
          // Separate balls to prevent overlap
          const overlap = minDistance - distance;
          const separateX = nx * overlap * 0.5;
          const separateY = ny * overlap * 0.5;
          b1.x -= separateX;
          b1.y -= separateY;
          b2.x += separateX;
          b2.y += separateY;
          
          // Calculate relative velocity in collision normal direction
          const dvx = b2.vx - b1.vx;
          const dvy = b2.vy - b1.vy;
          const dvn = dvx * nx + dvy * ny;
          
          // Do not resolve if velocities are separating
          if(dvn <= 0) continue;
          
          // Calculate collision impulse (assuming equal mass)
          const impulse = dvn;
          
          // Update velocities
          b1.vx += impulse * nx;
          b1.vy += impulse * ny;
          b2.vx -= impulse * nx;
          b2.vy -= impulse * ny;
        }
      }
    }
  }

  function draw(){
    // clear using CSS-space (transform handles scaling)
    ctx.clearRect(0,0,cssW,cssH);
    // subtle scanlines
    ctx.save(); ctx.globalAlpha=.06; ctx.fillStyle="#fff"; for(let y=0;y<cssH;y+=2){ ctx.fillRect(0,y,cssW,1); } ctx.restore();
    for(const b of state.balls){ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle='#e6e6e6'; ctx.fill(); }
  }

  // passive building production
  setInterval(()=>{ for(const b of Object.values(Buildings)){ if(b.n>0){ for(const [k,v] of Object.entries(b.prod)) state.resources[k]+=v*b.n; } } refresh(); }, 1000);

  // main loop
  function loop(){ stepBalls(); draw(); requestAnimationFrame(loop); }

  // ---------- persistence ----------
  let savePeriod = 5000;
  function save(){ try{ localStorage.setItem('tty_idle_save', JSON.stringify({r:state.resources, balls:state.balls, b:Object.fromEntries(Object.entries(Buildings).map(([k,v])=>[k,v.n])), mul:state.mul})) }catch(e){} }
  function load(){ try{ const d=JSON.parse(localStorage.getItem('tty_idle_save')||'null'); if(!d) return; if(d.r) Object.assign(state.resources,d.r); if(d.mul) Object.assign(state.mul,d.mul); if(d.balls&&Array.isArray(d.balls)&&d.balls.length) state.balls=d.balls; if(d.b){ for(const [k,n] of Object.entries(d.b)) if(Buildings[k]) Buildings[k].n=n; } }catch(e){} }
  setInterval(save, 5000);

  // ---------- tiny test runner ----------
  function runTests(){
    const out=[]; const ok=(name,cond)=>out.push(`${cond?'PASS':'FAIL'}: ${name}`);
    // createBall sanity
    const tb = createBall(); ok('createBall returns object', tb && typeof tb==='object');
    ok('ball in bounds (x)', tb.x>=tb.r && tb.x<=cssW-tb.r); ok('ball in bounds (y)', tb.y>=tb.r && tb.y<=cssH-tb.r);
    // can/pay
    state.resources.pixels=100; state.resources.energy=100; const c={pixels:10,energy:5}; ok('can() true', can(c)); pay(c); ok('pay() deducts', state.resources.pixels===90 && state.resources.energy===95);
    // UI built
    buildUpgrades(); buildBuildings(); buildResearch();
    ok('upgrades exist', Object.keys(Upgrades).every(k=>document.getElementById('u_'+k)));
    ok('buildings exist', Object.keys(Buildings).every(k=>document.getElementById('b_'+k)));
    ok('research exist', Object.keys(Research).every(k=>document.getElementById('r_'+k)));
    // stepBalls keeps bounds
    state.balls=[createBall()]; for(let i=0;i<200;i++) stepBalls();
    const b=state.balls[0]; ok('ball still in bounds', b.x>=b.r && b.x<=cssW-b.r && b.y>=b.r && b.y<=cssH-b.r);
    document.getElementById('tests').textContent = out.join('\n');
    console.log(out.join('\n'));
  }

  // ---------- boot ----------
  function boot(){
    fitCanvas();
    load();
    if(!state.balls.length) state.balls=[createBall()];
    buildUpgrades(); buildBuildings(); buildResearch();
    refresh();
    runTests();
    loop();
  }

  boot();
  </script>
</body>
</html>
